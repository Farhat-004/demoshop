# Prisma + MongoDB require a replica set (even for local dev).
# Start: docker compose up -d
# Stop:  docker compose down
services:
  mongo:
    image: mongo:7
    container_name: demoshop-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - demoshop_mongo_data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'localhost:27017' }]
            }).ok
          }
        "
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

volumes:
  demoshop_mongo_data:
